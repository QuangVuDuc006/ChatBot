<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to AI Chat Workspace and continue to the chatbot.">
    <meta name="theme-color" content="#eef3f8">
    <title>Login | AI Chat Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='landing.css') }}">
</head>
<body class="auth-page">
    <div class="page-gradient" aria-hidden="true"></div>

    <main class="auth-shell">
        <a class="nav-brand auth-brand" href="{{ url_for('landing') }}" aria-label="AI Chat Workspace home">
            <span class="brand-glyph">A</span>
            <span>AI Chat Workspace</span>
        </a>

        <section class="auth-card reveal">
            <div class="auth-copy">
                <p class="section-kicker">Welcome back</p>
                <h1>Sign in to continue to chat.</h1>
                <p>Use the workspace for drafts, files, model selection, and saved local threads.</p>
            </div>

            <form class="auth-form" action="{{ url_for('login') }}" method="post">
                <label>
                    <span>Email</span>
                    <input type="email" name="email" autocomplete="email" placeholder="you@example.com" required>
                </label>
                <label>
                    <span>Password</span>
                    <input type="password" name="password" autocomplete="current-password" placeholder="Enter password" required>
                </label>
                <button class="button button-primary button-large auth-submit" type="submit">
                    <span>Login</span>
                    <span class="button-icon"><i data-lucide="arrow-right"></i></span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('landing') }}">Back to landing</a>
                <a href="{{ url_for('chat_page') }}">Open chat directly</a>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='landing.js') }}" defer></script>
</body>
</html>
